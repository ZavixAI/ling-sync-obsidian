name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Build production plugin
        run: npm run build
      - name: Verify tag and release metadata
        run: npm run check:release -- "$GITHUB_REF_NAME"
      # Re-enable actions/attest after Obsidian supports GitHub's bundle_url response.
      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          --verify-tag
          --title "$GITHUB_REF_NAME"
          --draft
          --generate-notes
          main.js
          manifest.json
